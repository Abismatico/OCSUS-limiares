<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ocsus Limiares">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="description" content="Criador de Rituais Thaumatúrgicos — Sistema Limiares RPG">
    
    <title>OCSUS LIMIARES</title>
    
    <link rel="manifest" href="manifest.json git push -u origin main">
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="shortcut icon" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
    <link rel="mask-icon" href="icons/icon-maskable.png" color="#d4af37">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-sigil">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="100" r="90" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
                <circle cx="100" cy="100" r="70" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>
                <polygon points="100,20 173,145 27,145" fill="none" stroke="#d4af37" stroke-width="1"/>
                <polygon points="100,180 27,55 173,55" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.6"/>
                <circle cx="100" cy="100" r="30" fill="none" stroke="#d4af37" stroke-width="1"/>
                <circle cx="100" cy="100" r="4" fill="#d4af37"/>
            </svg>
        </div>
        <h1 class="splash-title">OCSUS LIMIARES</h1>
        <p class="splash-sub">GRIMÓRIO THAUMATÚRGICO</p>
        <div class="splash-loader"><div class="splash-bar"></div></div>
    </div>

    <!-- APP CONTAINER -->
    <div id="app" class="app hidden">
        
        <!-- HEADER -->
        <header class="app-header">
            <div class="header-inner">
                <button id="btn-menu" class="icon-btn" aria-label="Menu"><i class="fas fa-bars"></i></button>
                <div class="header-title">
                    <span class="header-mark">☩</span>
                    <h1 id="view-title">OCSUS</h1>
                </div>
                <button id="btn-install" class="icon-btn hidden" aria-label="Instalar"><i class="fas fa-download"></i></button>
            </div>
        </header>

        <!-- SIDE DRAWER -->
        <div id="drawer-overlay" class="drawer-overlay"></div>
        <aside id="drawer" class="drawer">
            <div class="drawer-header">
                <div class="drawer-sigil">
                    <svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" fill="none" stroke="#d4af37" stroke-width="1"/><polygon points="30,8 52,46 8,46" fill="none" stroke="#d4af37" stroke-width="1"/><circle cx="30" cy="30" r="3" fill="#d4af37"/></svg>
                </div>
                <div>
                    <h2>OCSUS</h2>
                    <p>Sistema Limiares</p>
                </div>
            </div>
            <nav class="drawer-nav">
                <button class="drawer-link active" data-view="home"><i class="fas fa-eye"></i> Oráculo</button>
                <button class="drawer-link" data-view="create"><i class="fas fa-pen-ruler"></i> Forjar Ritual</button>
                <button class="drawer-link" data-view="library"><i class="fas fa-scroll"></i> Biblioteca</button>
                <button class="drawer-link" data-view="grimoire"><i class="fas fa-book-skull"></i> Grimório</button>
                <button class="drawer-link" data-view="backlash"><i class="fas fa-bolt"></i> Calc. Backlash</button>
                <button class="drawer-link" data-view="enxertos"><i class="fas fa-band-aid"></i> Enxertos</button>
                <button class="drawer-link" data-view="pillars"><i class="fas fa-dharmachakra"></i> Pilares</button>
                <button class="drawer-link" data-view="paradigms"><i class="fas fa-user-secret"></i> Paradigmas</button>
                <button class="drawer-link" data-view="about"><i class="fas fa-scroll"></i> Manual</button>
            </nav>
            <div class="drawer-footer">
                <p class="drawer-quote">"O que se abre, não se fecha."</p>
                <p class="drawer-ver">v1.0 · OFFLINE</p>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main id="main-view" class="main-view">
            <!-- Views injected via JS -->
        </main>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="home"><i class="fas fa-eye"></i><span>Oráculo</span></button>
            <button class="nav-item" data-view="create"><i class="fas fa-pen-ruler"></i><span>Forjar</span></button>
            <button class="nav-item nav-center" data-view="create"><div class="center-sigil"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="17" fill="none" stroke="currentColor" stroke-width="1.5"/><polygon points="20,6 33,30 7,30" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="20" cy="20" r="2" fill="currentColor"/></svg></div></button>
            <button class="nav-item" data-view="grimoire"><i class="fas fa-book-skull"></i><span>Grimório</span></button>
            <button class="nav-item" data-view="backlash"><i class="fas fa-bolt"></i><span>Backlash</span></button>
        </nav>

        <!-- TOAST -->
        <div id="toast" class="toast"></div>

        <!-- MODAL -->
        <div id="modal" class="modal">
            <div class="modal-inner">
                <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/sigil.js"></script>
    <script src="js/narrative.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/views.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
